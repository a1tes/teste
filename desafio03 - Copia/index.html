<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <title>DNC - Gerenciador de Tarefas</title>
</head>
<body>
    <header>
        <h1>Board de tarefas</h1>
    </header>

    <main>
        <section id="create-todo-section" aria-labelledby="form-title">
            <h2 id="form-title" class="sr-only">Adicionar nova tarefa</h2>
            <form id="create-todo-form">
                <div class="input-group">
                    <input type="text" id="description" name="description" class="input-description"
                        aria-label="Nome da tarefa" placeholder="Nome da tarefa" required maxlength="100" />
                </div>
                <div class="input-group">
                    <input type="text" id="etiqueta" name="etiqueta" class="input-description" 
                        aria-label="Etiqueta (ex: Frontend)" placeholder="Etiqueta" maxlength="20" />
                </div>
                <button type="submit" aria-label="Cadastrar tarefa" class="add-task-btn" title="Adicionar">+</button>
            </form>
        </section>

        <section class="todo-list-section">
            <ul id="todo-list" aria-label="Lista de tarefas pendentes e concluídas">
                </ul>
        </section>
    </main>

    <footer>
        <p id="contador-tarefas" aria-live="polite">0 tarefa(s) concluída(s)</p>
    </footer>

    <script src="js/index.js"></script>
</body>
</html>
